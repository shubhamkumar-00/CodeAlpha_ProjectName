<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player | CodeAlpha</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      padding: 2rem 1rem;
    }

    .player-container {
      width: 100%;
      max-width: 820px;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 0;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 60px 120px rgba(0,0,0,0.8);
    }

    /* LEFT - ARTWORK */
    .player-left {
      background: linear-gradient(145deg, #13131f 0%, #0d0d1a 100%);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .player-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(120, 80, 255, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .album-art {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777, #f59e0b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 80px rgba(120,58,237,0.3);
      transition: transform 0.3s ease;
      animation: none;
      position: relative;
    }

    .album-art.spinning { animation: spin 8s linear infinite; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .album-art .dot {
      position: absolute;
      width: 30px; height: 30px;
      background: #080810;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1);
    }

    .song-info { text-align: center; }
    .song-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f0f0ff;
      margin-bottom: 0.3rem;
    }
    .song-artist {
      font-size: 0.9rem;
      color: #6060a0;
      letter-spacing: 0.05em;
    }
    .song-album {
      font-size: 0.78rem;
      color: #3a3a60;
      margin-top: 0.2rem;
      font-style: italic;
    }

    /* EQ VISUALIZER */
    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 40px;
    }

    .bar {
      width: 4px;
      background: linear-gradient(to top, #7c3aed, #db2777);
      border-radius: 2px;
      min-height: 4px;
      animation: none;
    }

    .playing .bar { animation: eq 0.8s ease-in-out infinite alternate; }
    .bar:nth-child(1) { animation-delay: 0.0s; --h: 60%; }
    .bar:nth-child(2) { animation-delay: 0.1s; --h: 80%; }
    .bar:nth-child(3) { animation-delay: 0.2s; --h: 50%; }
    .bar:nth-child(4) { animation-delay: 0.3s; --h: 90%; }
    .bar:nth-child(5) { animation-delay: 0.15s; --h: 70%; }
    .bar:nth-child(6) { animation-delay: 0.25s; --h: 55%; }
    .bar:nth-child(7) { animation-delay: 0.05s; --h: 75%; }
    .bar:nth-child(8) { animation-delay: 0.35s; --h: 45%; }
    .bar:nth-child(9) { animation-delay: 0.2s; --h: 85%; }
    .bar:nth-child(10){ animation-delay: 0.1s; --h: 65%; }

    @keyframes eq {
      from { height: 4px; }
      to { height: var(--h, 60%); }
    }

    /* RIGHT - CONTROLS */
    .player-right {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
    }

    .controls-top {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid #1a1a2e;
    }

    .progress-section { margin-bottom: 1.5rem; }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #404070;
      margin-bottom: 0.5rem;
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: #1a1a2e;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: visible;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #db2777);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(123,58,237,0.8);
    }

    .btn-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #5050a0;
      cursor: pointer;
      font-size: 1.3rem;
      transition: all 0.2s ease;
      padding: 0.4rem;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px;
    }

    .ctrl-btn:hover { color: #b0b0ff; background: rgba(120,80,255,0.1); }

    .ctrl-btn.play-btn {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      width: 58px; height: 58px;
      font-size: 1.6rem;
      box-shadow: 0 8px 30px rgba(123,58,237,0.5);
    }

    .ctrl-btn.play-btn:hover { transform: scale(1.07); box-shadow: 0 12px 40px rgba(123,58,237,0.7); }

    .ctrl-btn.active { color: #db2777; }

    /* VOLUME */
    .volume-section {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid #1a1a2e;
    }

    .vol-icon { font-size: 1rem; color: #404070; }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #1a1a2e;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: #7c3aed;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(123,58,237,0.8);
    }

    .vol-pct {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #404070;
      min-width: 35px;
      text-align: right;
    }

    /* PLAYLIST */
    .playlist {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .playlist::-webkit-scrollbar { width: 4px; }
    .playlist::-webkit-scrollbar-track { background: transparent; }
    .playlist::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }

    .playlist-header {
      padding: 0.5rem 2rem 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #303060;
      font-weight: 700;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 2rem;
      cursor: pointer;
      transition: background 0.2s;
      border-left: 2px solid transparent;
    }

    .playlist-item:hover { background: rgba(120,80,255,0.07); }
    .playlist-item.active {
      background: rgba(120,80,255,0.12);
      border-left-color: #7c3aed;
    }

    .track-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: #303060;
      min-width: 22px;
    }

    .playlist-item.active .track-num { color: #db2777; }

    .track-emoji { font-size: 1.4rem; }

    .track-meta { flex: 1; }
    .track-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: #b0b0d0;
    }
    .track-artist-name {
      font-size: 0.75rem;
      color: #404070;
      margin-top: 0.1rem;
    }

    .playlist-item.active .track-name { color: #f0f0ff; }

    .track-dur {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: #303060;
    }

    @media (max-width: 640px) {
      .player-container {
        grid-template-columns: 1fr;
        border-radius: 16px;
      }
      .album-art { width: 160px; height: 160px; }
    }
  </style>
</head>
<body>

<div class="player-container" id="playerContainer">
  <!-- LEFT -->
  <div class="player-left">
    <div class="album-art" id="albumArt">
      <span id="albumEmoji">🎵</span>
      <div class="dot"></div>
    </div>

    <div class="song-info">
      <div class="song-title" id="songTitle">Select a track</div>
      <div class="song-artist" id="songArtist">Artist Name</div>
      <div class="song-album" id="songAlbum">Album</div>
    </div>

    <div class="visualizer" id="visualizer">
      <div class="bar" style="--h:60%"></div>
      <div class="bar" style="--h:80%"></div>
      <div class="bar" style="--h:50%"></div>
      <div class="bar" style="--h:90%"></div>
      <div class="bar" style="--h:70%"></div>
      <div class="bar" style="--h:55%"></div>
      <div class="bar" style="--h:75%"></div>
      <div class="bar" style="--h:45%"></div>
      <div class="bar" style="--h:85%"></div>
      <div class="bar" style="--h:65%"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="player-right">
    <div class="controls-top">
      <div class="progress-section">
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
        <div class="progress-bar" id="progressBar" onclick="seekTrack(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="btn-controls">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
        <button class="ctrl-btn" onclick="changeTrack(-1)" title="Previous">⏮</button>
        <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()" title="Play/Pause">▶</button>
        <button class="ctrl-btn" onclick="changeTrack(1)" title="Next">⏭</button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">🔁</button>
      </div>
    </div>

    <div class="volume-section">
      <span class="vol-icon" id="volIcon">🔊</span>
      <input type="range" id="volumeSlider" min="0" max="100" value="70" oninput="setVolume(this.value)" />
      <span class="vol-pct" id="volPct">70%</span>
    </div>

    <div class="playlist">
      <div class="playlist-header">Playlist — 6 Tracks</div>
      <div id="playlistItems"></div>
    </div>
  </div>
</div>

<script>
  const tracks = [
    { title: "Midnight Drive",     artist: "Neon Pulse",      album: "City Lights",    emoji: "🌙", duration: "3:42" },
    { title: "Golden Hour",        artist: "Amber Waves",     album: "Sunrise EP",     emoji: "🌅", duration: "4:15" },
    { title: "Electric Storm",     artist: "Volt & Thunder",  album: "Static",         emoji: "⚡", duration: "3:58" },
    { title: "Ocean Breeze",       artist: "Coastal Dreams",  album: "Tides",          emoji: "🌊", duration: "5:01" },
    { title: "Cherry Blossom",     artist: "Sakura Bloom",    album: "Spring Nights",  emoji: "🌸", duration: "3:29" },
    { title: "Galaxy Runner",      artist: "Cosmo Drive",     album: "Orbit",          emoji: "🚀", duration: "4:44" },
  ];

  let currentTrack = 0;
  let isPlaying = false;
  let isShuffle = false;
  let isRepeat = false;
  let volume = 0.7;

  // Simulated progress
  let progress = 0;
  let progressInterval = null;
  let duration = 222; // seconds (fake)

  function buildPlaylist() {
    const container = document.getElementById('playlistItems');
    container.innerHTML = '';
    tracks.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'playlist-item' + (i === currentTrack ? ' active' : '');
      div.innerHTML = `
        <span class="track-num">${String(i+1).padStart(2,'0')}</span>
        <span class="track-emoji">${t.emoji}</span>
        <div class="track-meta">
          <div class="track-name">${t.title}</div>
          <div class="track-artist-name">${t.artist}</div>
        </div>
        <span class="track-dur">${t.duration}</span>
      `;
      div.addEventListener('click', () => { currentTrack = i; loadTrack(); play(); });
      container.appendChild(div);
    });
  }

  function loadTrack() {
    const t = tracks[currentTrack];
    document.getElementById('songTitle').textContent = t.title;
    document.getElementById('songArtist').textContent = t.artist;
    document.getElementById('songAlbum').textContent = t.album;
    document.getElementById('albumEmoji').textContent = t.emoji;

    // Parse duration
    const [m, s] = t.duration.split(':').map(Number);
    duration = m * 60 + s;
    document.getElementById('totalTime').textContent = t.duration;

    progress = 0;
    updateProgress();
    buildPlaylist();
  }

  function play() {
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('albumArt').classList.add('spinning');
    document.getElementById('visualizer').classList.add('playing');
    startProgress();
  }

  function pause() {
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('albumArt').classList.remove('spinning');
    document.getElementById('visualizer').classList.remove('playing');
    clearInterval(progressInterval);
  }

  function togglePlay() {
    if (isPlaying) pause();
    else play();
  }

  function startProgress() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      progress++;
      if (progress >= duration) {
        if (isRepeat) { progress = 0; }
        else { changeTrack(1); return; }
      }
      updateProgress();
    }, 1000);
  }

  function updateProgress() {
    const pct = (progress / duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    const m = Math.floor(progress / 60);
    const s = progress % 60;
    document.getElementById('currentTime').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }

  function seekTrack(e) {
    const bar = document.getElementById('progressBar');
    const rect = bar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    progress = Math.floor(pct * duration);
    updateProgress();
  }

  function changeTrack(dir) {
    clearInterval(progressInterval);
    if (isShuffle) {
      let r;
      do { r = Math.floor(Math.random() * tracks.length); } while (r === currentTrack);
      currentTrack = r;
    } else {
      currentTrack = (currentTrack + dir + tracks.length) % tracks.length;
    }
    loadTrack();
    if (isPlaying) play();
  }

  function setVolume(v) {
    volume = v / 100;
    document.getElementById('volPct').textContent = v + '%';
    const icon = v == 0 ? '🔇' : v < 40 ? '🔉' : '🔊';
    document.getElementById('volIcon').textContent = icon;
  }

  function toggleShuffle() {
    isShuffle = !isShuffle;
    document.getElementById('shuffleBtn').style.color = isShuffle ? '#db2777' : '';
  }

  function toggleRepeat() {
    isRepeat = !isRepeat;
    document.getElementById('repeatBtn').style.color = isRepeat ? '#7c3aed' : '';
  }

  // Init
  loadTrack();
</script>
</body>
</html>
